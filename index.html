<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#1e3a5f" />
    <title>システム手帳</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="app-top-bar">
      <header id="app-header">
        <h1>システム手帳</h1>
        <button id="sync-btn" aria-label="データを更新">
          <svg class="sync-icon" viewBox="0 0 24 24" width="24" height="24">
            <path
              d="M17.65 6.35A7.96 7.96 0 0012 4C7.58 4 4.01 7.58 4.01 12S7.58 20 12 20c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"
              fill="currentColor"
            />
          </svg>
        </button>
      </header>
      <nav id="tab-bar">
        <button class="tab-btn active" data-tab="task">Task</button>
        <button class="tab-btn" data-tab="daily">Daily</button>
        <button class="tab-btn" data-tab="note">Note</button>
        <button class="tab-btn" data-tab="journal">Journal</button>
      </nav>
    </div>

    <div id="gas-warning" class="gas-warning" style="display: none">
      GAS URLが未設定です。ローカルモードで動作中。
      <button id="gas-warning-setup">設定</button>
    </div>

    <div id="header-spacer"></div>

    <main id="scroll-container">
      <div id="tab-content"></div>
    </main>

    <div id="toast-container"></div>

    <div id="modal-overlay" class="modal-overlay" style="display: none">
      <div id="modal-content" class="modal-content"></div>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
