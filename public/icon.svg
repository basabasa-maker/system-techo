<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- White background -->
  <rect width="512" height="512" rx="96" fill="#ffffff"/>

  <!-- Moleskine notebook body -->
  <rect x="80" y="48" width="340" height="416" rx="14" fill="#1e3a5f"/>

  <!-- Notebook spine/band -->
  <rect x="80" y="48" width="30" height="416" rx="7" fill="#152c4a"/>

  <!-- Elastic band (horizontal) -->
  <rect x="80" y="348" width="340" height="4" fill="#2a4d7a" rx="2"/>

  <!-- Label area (cream colored rectangle) -->
  <rect x="148" y="100" width="236" height="88" rx="4" fill="#f5f0e8"/>

  <!-- Inner lines on label (planner lines) -->
  <line x1="160" y1="128" x2="372" y2="128" stroke="#d0c8b8" stroke-width="1.5"/>
  <line x1="160" y1="150" x2="372" y2="150" stroke="#d0c8b8" stroke-width="1.5"/>
  <line x1="160" y1="172" x2="310" y2="172" stroke="#d0c8b8" stroke-width="1.5"/>

  <!-- Large checkmark — タスク管理を象徴（3倍サイズ） -->
  <polyline points="170,310 260,410 410,200" fill="none" stroke="#ffffff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
</svg>
